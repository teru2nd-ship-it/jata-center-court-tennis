<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
  html,body{height:100%}
  body{
    background:radial-gradient(130% 90% at 50% -15%, #20305c 0%, #131d3c 50%, #0a1022 100%);
    color:#eef3ff;
    font-family:-apple-system,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
    position:relative;overflow-x:hidden;min-height:100%;
  }
  /* 月明かり */
  body::before{content:"";position:fixed;top:-12%;right:-6%;width:42vw;height:42vw;z-index:0;pointer-events:none;
    background:radial-gradient(circle, rgba(255,250,235,.35) 0%, rgba(255,250,235,.10) 35%, transparent 65%)}

  /* ===== オーロラ ===== */
  #aurora{position:fixed;inset:-20%;z-index:0;pointer-events:none;filter:blur(58px);opacity:.55}
  .blob{position:absolute;border-radius:50%;mix-blend-mode:screen;animation:drift 22s ease-in-out infinite}
  .b1{width:48vw;height:48vw;left:-8vw;top:8vh;background:radial-gradient(circle,#39b06a,transparent 70%);animation-duration:24s}
  .b2{width:44vw;height:44vw;right:-10vw;top:2vh;background:radial-gradient(circle,#4a90d9,transparent 70%);animation-duration:28s;animation-delay:-6s}
  .b3{width:40vw;height:40vw;left:8vw;bottom:-6vh;background:radial-gradient(circle,#8b6ad6,transparent 70%);animation-duration:26s;animation-delay:-12s}
  .b4{width:30vw;height:30vw;right:10vw;bottom:4vh;background:radial-gradient(circle,#f0a93a,transparent 70%);animation-duration:20s;animation-delay:-3s}
  @keyframes drift{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(4vw,3vh) scale(1.14)}}

  /* ===== 星・雪 ===== */
  #stars,#fall{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
  .star{position:absolute;border-radius:50%;background:#fff;animation:tw 3.2s ease-in-out infinite}
  @keyframes tw{0%,100%{opacity:.18}50%{opacity:1}}
  .spark{position:absolute;top:-8%;line-height:1;will-change:transform,opacity}
  @keyframes fall{0%{transform:translateY(-12vh) translateX(0) rotate(0)}100%{transform:translateY(112vh) translateX(20px) rotate(280deg)}}
  @keyframes twk{0%,100%{opacity:.3}50%{opacity:1}}

  /* ===== 一覧ビュー ===== */
  #gridView{position:relative;z-index:2;padding:20px 14px 28px}
  .lede{text-align:center;margin:8px 0 20px}
  .lede h1{font-size:24px;letter-spacing:.06em;font-weight:800;color:#f3f7ff;
    text-shadow:0 0 18px rgba(120,160,255,.45), 0 2px 4px rgba(0,0,0,.3)}
  .lede .snow{opacity:.7;font-weight:400}
  .lede p{color:#aebbdd;font-size:12px;margin-top:8px;letter-spacing:.03em}

  .enter{display:block;width:100%;max-width:520px;margin:0 auto 24px;cursor:pointer;border:0;
    text-decoration:none;
    background:linear-gradient(135deg,#ffc94f,#e0852a);color:#41250a;font-weight:800;font-size:18px;
    text-align:center;padding:17px;border-radius:18px;
    box-shadow:0 8px 26px rgba(240,169,58,.40), inset 0 1px 0 rgba(255,255,255,.5);
    animation:glow 3.2s ease-in-out infinite}
  @keyframes glow{0%,100%{box-shadow:0 8px 24px rgba(240,169,58,.34), inset 0 1px 0 rgba(255,255,255,.5)}
    50%{box-shadow:0 12px 36px rgba(255,200,90,.6), inset 0 1px 0 rgba(255,255,255,.6)}}
  .enter:active{transform:translateY(1px)}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:560px;margin:0 auto}

  /* ===== カード（透過フロスト＋実サムネ） ===== */
  .card{position:relative;cursor:pointer;overflow:hidden;display:flex;flex-direction:column;text-align:left;
    background:rgba(18,26,51,.32);border:1px solid rgba(150,175,225,.30);border-top:3px solid var(--ac,#888);
    border-radius:14px;color:inherit;text-decoration:none;
    backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px);
    box-shadow:0 10px 26px rgba(0,0,0,.4);transition:transform .14s ease,box-shadow .14s ease}
  .card:active{transform:scale(.97)}
  .card:hover{transform:translateY(-3px);box-shadow:0 16px 32px rgba(0,0,0,.5)}

  .thumb{aspect-ratio:16/10;position:relative;background:#0b1125;
    display:flex;align-items:center;justify-content:center;overflow:hidden}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .thumb::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 55%,rgba(7,11,24,.55))}
  .ico{font-size:42px;line-height:1;filter:drop-shadow(0 3px 6px rgba(0,0,0,.18))}
  .gtag{position:absolute;left:9px;bottom:8px;z-index:2;background:rgba(7,11,24,.78);color:#fff;
    font-size:9px;font-weight:800;letter-spacing:.04em;padding:3px 8px;border-radius:999px;border:1px solid rgba(255,255,255,.18)}

  .body{padding:11px 12px 13px;color:#eef3ff}
  .name{font-size:14px;font-weight:800;line-height:1.25}
  .desc{font-size:11px;color:#aebbdd;margin-top:5px;line-height:1.45}

  .foot{max-width:560px;margin:22px auto 0;text-align:center;color:#8fa0c8;font-size:10px;opacity:.9}
</style>
</head>
<body>
  <div id="aurora"><span class="blob b1"></span><span class="blob b2"></span><span class="blob b3"></span><span class="blob b4"></span></div>
  <div id="stars"></div>
  <div id="fall"></div>

  <!-- ===== 一覧ビュー ===== -->
  <div id="gridView">
    <div class="lede">
      <h1><span class="snow">✦</span> JATA ARCADE <span class="snow">✦</span></h1>
      <p>広告を見て遊ぶ、課金なしのゲーセン</p>
    </div>

    <!-- ARCADEトップへ（最上位ウィンドウで遷移） -->
    <a class="enter" href="https://jata-arcade-control-tower.vercel.app/" target="_top" rel="noopener">▶ ARCADEに入る</a>

    <div class="grid" id="grid"></div>

    <div class="foot">— ゆっくり遊んでいってね —</div>
  </div>

<script>
  // 全カード target="_top"（WIX枠を抜けて各ゲームへ全画面遷移／iframe不具合を回避）。
  // サムネは control-tower 配信の実プレイ画像。読めない時は ico 絵文字にフォールバック。
  var A = "https://jata-arcade-control-tower.vercel.app";
  var GAMES = [
    {title:"JATA DROP",            genre:"落ち物進化", desc:"タマゴからドラゴンへ12段進化",        ico:"🐉", ac:"#ef9d33", url:"https://jata-drop.vercel.app/",                  thumb:A+"/assets/thumbs/drop-score.png"},
    {title:"Spider Solitaire",     genre:"カード",     desc:"一人でじっくり、王道のソリティア",      ico:"🕷️", ac:"#2f9e6b", url:"https://spider-solitaire-sigma.vercel.app/",     thumb:A+"/assets/thumbs/spider.jpg"},
    {title:"国旗神経衰弱",          genre:"記憶",       desc:"世界の国旗でペアを探す記憶ゲーム",      ico:"🌐", ac:"#4a90d9", url:"https://flag-memory-game.vercel.app/",           thumb:A+"/assets/thumbs/flag.jpg"},
    {title:"BOTTON",               genre:"落ち物",     desc:"ARCADE第一弾、原点の落ち物",          ico:"🔘", ac:"#14b3c4", url:"https://botton.vercel.app/",                     thumb:A+"/assets/thumbs/botton.jpg"},
    {title:"JATA QUIZ",            genre:"クイズ",     desc:"4ブランド19パックの早押しクイズ",       ico:"❓", ac:"#8b6ad6", url:A+"/games/sports-quiz-rush",                      thumb:A+"/assets/thumbs/quiz.jpg"},
    {title:"Dino Drive Derby 3D",  genre:"3Dドライブ", desc:"恐竜世界を走る3Dドライブ",            ico:"🦖", ac:"#e0653f", url:A+"/games/car-drive-3d/",                         thumb:A+"/assets/thumbs/ddd3d.jpg"},
    {title:"Space Hockey",         genre:"エアホッケー", desc:"宇宙テーブルでCPUと対戦",             ico:"🏒", ac:"#55f0ff", url:A+"/games/space-hockey/",                         thumb:""},
    {title:"JATA BOX SHIFT",       genre:"倉庫番パズル", desc:"30面の巣作りパズル公開版",             ico:"🥚", ac:"#78c257", url:"https://jata-box-shift.vercel.app/",             thumb:A+"/assets/thumbs/box-shift.jpg"},
    {title:"CENTER COURT",         genre:"テニス",     desc:"芝・クレー・ハードで疑似3Dテニス",       ico:"🎾", ac:"#d8f23a", url:"https://jata-center-court-tennis.vercel.app/",    thumb:"https://jata-center-court-tennis.vercel.app/assets/jata-open-emblem.png"},
    {title:"JATA SNAKE RUNNER",    genre:"アクション", desc:"5ステージ＋ボスの横スクロール",        ico:"🐍", ac:"#3fae5a", url:A+"/games/jata-snake-runner/",                    thumb:A+"/assets/thumbs/snake.jpg"},
    {title:"空海 KUKAI",            genre:"シューティング", desc:"ロケットスネークで星の潮流を進む", ico:"🚀", ac:"#45d483", url:"https://jata-snake-shooter.vercel.app/jata-snake-shooter.html", thumb:"https://jata-snake-shooter.vercel.app/assets/title/kukai-thumbnail.png"},
    {title:"JATA ARROWS",          genre:"パズル",     desc:"向いた先が空の矢印だけ消す脱出パズル",   ico:"➤", ac:"#19b3a0", url:"https://jata-arrows.vercel.app/",                thumb:A+"/assets/thumbs/arrows.jpg"},
    {title:"JATA LAB",             genre:"落ち物パズル", desc:"同じ色を4つ並べてキンを消す",          ico:"💊", ac:"#a06bff", url:"https://jata-lab.vercel.app/",                   thumb:A+"/assets/thumbs/jatalab.jpg"},
  ];

  var grid = document.getElementById('grid');
  GAMES.forEach(function(g){
    var thumb = g.thumb
      ? '<img src="'+g.thumb+'" alt="" loading="lazy" onerror="this.replaceWith(Object.assign(document.createElement(\'span\'),{className:\'ico\',textContent:\''+g.ico+'\'}))">'
      : '<span class="ico">'+g.ico+'</span>';
    var a = document.createElement('a');
    a.className = 'card';
    a.href = g.url;
    a.target = '_top';
    a.rel = 'noopener';
    a.style.setProperty('--ac', g.ac);
    a.innerHTML =
      '<div class="thumb">'+thumb+'<span class="gtag">'+g.genre+'</span></div>' +
      '<div class="body"><div class="name">'+g.title+'</div>' +
      '<div class="desc">'+g.desc+'</div></div>';
    grid.appendChild(a);
  });

  // 星をまく（瞬き）
  var stars = document.getElementById('stars');
  for(var s=0;s<54;s++){
    var st = document.createElement('span'); st.className='star';
    var sz = (Math.random()<0.18) ? 3 : (Math.random()<0.5?2:1.4);
    st.style.width = sz+'px'; st.style.height = sz+'px';
    st.style.left = (Math.random()*100)+'%'; st.style.top = (Math.random()*100)+'%';
    st.style.animationDelay = (-Math.random()*3.2)+'s';
    st.style.opacity = (0.3+Math.random()*0.6).toFixed(2);
    stars.appendChild(st);
  }
  // カラフルなキラキラ星が降る
  var fall = document.getElementById('fall');
  var sparkChars=['✦','✧','★','⋆','❋'];
  var sparkCols=['#ffd34d','#7ec8ff','#9b8cff','#74e39a','#ff8fb3','#5fe0d6','#ffb066'];
  for(var i=0;i<20;i++){
    var f=document.createElement('span'); f.className='spark';
    f.textContent=sparkChars[i%sparkChars.length];
    var col=sparkCols[Math.floor(Math.random()*sparkCols.length)];
    f.style.color=col; f.style.textShadow='0 0 6px '+col+', 0 0 12px '+col;
    f.style.left=(Math.random()*100)+'%';
    f.style.fontSize=(9+Math.random()*13)+'px';
    var dur=(7+Math.random()*9), delay=(-Math.random()*12).toFixed(2), tw=(1.1+Math.random()*1.6).toFixed(2);
    f.style.animation='fall '+dur.toFixed(2)+'s linear '+delay+'s infinite, twk '+tw+'s ease-in-out '+delay+'s infinite';
    fall.appendChild(f);
  }
</script>
</body>
</html>

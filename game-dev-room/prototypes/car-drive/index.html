<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Car Drive Sample</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app" aria-label="Car Drive Sample">
      <section class="top-bar">
        <div class="brand">
          <p>TERU GAMES / Kids Prototype</p>
          <h1>CAR DRIVE</h1>
          <label class="car-picker">
            <span>Car</span>
            <select id="carSelect" aria-label="Car type">
              <option value="arcade-red">Arcade Red</option>
              <option value="toyota-hilux">Toyota Hilux</option>
              <option value="porsche-959">Porsche 959</option>
            </select>
          </label>
        </div>
        <div class="actions">
          <button id="pauseBtn" type="button">Pause</button>
          <button id="restartBtn" type="button">Restart</button>
          <button id="soundBtn" type="button" aria-pressed="true">SFX ON</button>
        </div>
      </section>

      <section class="stats" aria-label="Score board">
        <div>
          <span>Score</span>
          <strong id="score">0</strong>
        </div>
        <div>
          <span>Best</span>
          <strong id="best">0</strong>
        </div>
        <div>
          <span>Level</span>
          <strong id="level">1</strong>
        </div>
      </section>

      <section class="road-wrap">
        <canvas id="game" width="360" height="640" aria-label="Driving game"></canvas>
        <div id="overlay" class="overlay">
          <strong id="overlayTitle">Ready?</strong>
          <span id="overlayText">Press Start</span>
          <button id="startBtn" type="button">Start</button>
        </div>
      </section>

      <section class="controls" aria-label="Touch controls">
        <button id="leftBtn" type="button" aria-label="Left">←</button>
        <button id="boostBtn" type="button" aria-label="Boost">GO</button>
        <button id="rightBtn" type="button" aria-label="Right">→</button>
      </section>
    </main>

    <script src="./game.js"></script>
  </body>
</html>

<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Tetromino Drop Sample</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app" aria-label="Tetromino Drop Sample">
      <section class="top-bar">
        <div>
          <p class="eyebrow">TERU GAMES / Prototype</p>
          <h1>TETROMINO DROP</h1>
        </div>
        <div class="top-actions">
          <button id="fullscreenBtn" type="button">Full</button>
          <button id="pauseBtn" type="button">Pause</button>
          <button id="restartBtn" type="button">Restart</button>
        </div>
      </section>

      <section class="settings-bar" aria-label="Game settings">
        <label class="theme-picker">
          <span>Version</span>
          <select id="themeSelect" aria-label="Block design version">
            <option value="classic">Classic</option>
            <option value="meteor">🌠 Shooting Star</option>
            <option value="jata">JATA Reptile</option>
            <option value="poop">Poop Face</option>
          </select>
        </label>
        <div class="audio-actions" aria-label="Audio settings">
          <button id="bgmToggle" type="button" aria-pressed="true">BGM ON</button>
          <button id="sfxToggle" type="button" aria-pressed="true">SFX ON</button>
        </div>
      </section>

      <section class="game-layout">
        <aside class="panel">
          <div class="stat">
            <span>Score</span>
            <strong id="score">0</strong>
          </div>
          <div class="stat">
            <span>Lines</span>
            <strong id="lines">0</strong>
          </div>
          <div class="stat">
            <span>Level</span>
            <strong id="level">1</strong>
          </div>
          <div class="stat">
            <span>Best</span>
            <strong id="best">0</strong>
          </div>
        </aside>

        <section class="board-wrap">
          <canvas id="board" width="300" height="600" aria-label="Game board"></canvas>
          <div id="overlay" class="overlay hidden">
            <strong id="overlayTitle">Paused</strong>
            <span id="overlayText">Press pause to resume.</span>
          </div>
        </section>

        <aside class="panel next-panel">
          <span class="label">Next</span>
          <canvas id="next" width="120" height="120" aria-label="Next piece"></canvas>
          <p class="help">Keys: Arrow / Z / X / Space</p>
        </aside>
      </section>

      <section class="touch-controls" aria-label="Touch controls">
        <div class="dpad" aria-label="Move controls">
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
          <span aria-hidden="true"></span>
          <button type="button" data-action="left" aria-label="Left">←</button>
          <span class="dpad-center" aria-hidden="true"></span>
          <button type="button" data-action="right" aria-label="Right">→</button>
          <span aria-hidden="true"></span>
          <button type="button" data-action="drop" aria-label="Down">↓</button>
          <span aria-hidden="true"></span>
        </div>
        <div class="action-stack" aria-label="Action controls">
          <button class="rotate-action" type="button" data-action="rotate" aria-label="Rotate">↻</button>
          <button class="hard-drop" type="button" data-action="hardDrop">DROP</button>
        </div>
      </section>
    </main>

    <script src="./game.js"></script>
  </body>
</html>
